name: E2E Unit Tests

on:
  push:
  pull_request:

jobs:
  unit-tests:
    name: Run Exhaustive Unit Tests
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Maude
        run: |
          sudo apt-get update -q
          sudo apt-get install -y maude

      - name: Set up Python 3
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Run Phase 1 test suite and validate results
        run: python3 .github/scripts/validate-tests.py test-opencog.maude

      - name: Run Phase 2 test suite and validate results
        run: python3 .github/scripts/validate-tests.py test-new-modules.maude

      - name: Run comprehensive coverage test suite and validate results
        run: python3 .github/scripts/validate-tests.py test-coverage.maude

      - name: Run algebraic property tests (Phase 6.3)
        run: python3 .github/scripts/validate-tests.py test-properties.maude

      - name: Upload raw Maude output on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: maude-test-output
          path: /tmp/maude-test-output.txt
          if-no-files-found: ignore
